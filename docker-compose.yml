services:
  postgres:
    image: postgres:16-alpine
    container_name: bot-finance-telegram-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bot_finance_telegram
      POSTGRES_USER: bot_finance_telegram
      POSTGRES_PASSWORD: bot_finance_telegram
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bot_finance_telegram -d bot_finance_telegram"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  bot:
    build: .
    container_name: bot-finance-telegram
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://bot_finance_telegram:bot_finance_telegram@postgres:5432/bot_finance_telegram
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
