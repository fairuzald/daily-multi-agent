name: Life Reminder Tick Cron

# Required GitHub Actions secrets:
# LIFE_TICK_URL=https://your-domain.example.com/api/life_reminder_tick
# LIFE_REMINDER_TICK_TOKEN=your-life-reminder-tick-token

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Call life reminder tick endpoint
        env:
          LIFE_TICK_URL: ${{ secrets.LIFE_TICK_URL }}
          LIFE_REMINDER_TICK_TOKEN: ${{ secrets.LIFE_REMINDER_TICK_TOKEN }}
        run: |
          test -n "$LIFE_TICK_URL"
          test -n "$LIFE_REMINDER_TICK_TOKEN"
          curl --fail --show-error --silent \
            -X POST "$LIFE_TICK_URL" \
            -H "x-reminder-token: $LIFE_REMINDER_TICK_TOKEN"
